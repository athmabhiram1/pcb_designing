name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ai_backend/requirements.txt

      - name: Run pytest
        run: python -m pytest ai_backend/tests/ -v --tb=short

      - name: Compile Python sources
        run: |
          python - <<'PY'
          import py_compile
          from pathlib import Path

          roots = [Path("ai_backend"), Path("plugin")]
          files = []
          for root in roots:
              files.extend(sorted(root.rglob("*.py")))

          if not files:
              raise SystemExit("No Python files found to compile.")

          for file_path in files:
              py_compile.compile(str(file_path), doraise=True)
          print(f"Compiled {len(files)} files successfully")
          PY

  smoke-test:
    runs-on: ubuntu-latest
    needs: test-and-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ai_backend/requirements.txt

      - name: Start backend
        working-directory: ai_backend
        run: |
          nohup python -m uvicorn ai_server:app --host 127.0.0.1 --port 8765 > uvicorn.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import time
          import urllib.request

          base = "http://127.0.0.1:8765/health"
          deadline = time.time() + 60
          last_error = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(base, timeout=2) as resp:
                      if resp.status == 200:
                          print("Backend is healthy")
                          raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
              time.sleep(1)

          raise SystemExit(f"Backend did not become healthy in time. Last error: {last_error}")
          PY

      - name: Run smoke test
        env:
          BACKEND_BASE_URL: http://127.0.0.1:8765
        run: python ai_backend/smoke_test.py

      - name: Show backend log on failure
        if: failure()
        run: |
          echo "---- ai_backend/uvicorn.log ----"
          cat ai_backend/uvicorn.log || true
